<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Mis repositorios GitHub</title>
  <link rel="stylesheet" href="timeline.css">
</head>
<body>
  <header class="main-header">
    <h1>Innovando en la era de la Inteligencia Artificial</h1>
    <p class="subtitle">Construyendo el futuro, un proyecto a la vez</p>
  </header>
  <section class="timeline-section">
    <div id="projects-timeline" class="projects-timeline"></div>
  </section>

  <script>
    const username = 'juliancardozo';
    // Mostrar todos los proyectos, sin filtro de días
    const timeline = document.getElementById('projects-timeline');

    fetch(`https://api.github.com/users/${username}/repos?sort=updated&per_page=100`)
      .then(response => response.json())
      .then(repos => {
        const allRepos = repos.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));
        if (allRepos.length === 0) {
          timeline.innerHTML = '<p>No hay proyectos disponibles.</p>';
          return;
        }
        timeline.innerHTML = `<div class="timeline">
          ${allRepos.map((repo, idx) => `
            <div class="timeline-item ${idx % 2 === 0 ? 'left' : 'right'}">
              <div class="timeline-content">
                <h2><a href="${repo.html_url}" target="_blank">${repo.name}</a></h2>
                <p>${repo.description || 'Sin descripción'}</p>
                <span class="date-label">${new Date(repo.updated_at).toLocaleDateString()}</span>
              </div>
            </div>
          `).join('')}
        </div>`;
      })
      .catch(err => {
        timeline.innerHTML = '<p>Error cargando proyectos.</p>';
        console.error(err);
      });
  </script>
</body>
</html>
